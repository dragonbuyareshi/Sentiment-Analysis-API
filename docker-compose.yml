version: "3.9"

# ══════════════════════════════════════════════════════════════════
# Sentiment Analysis API — Docker Compose
# Services: api · redis · ui (nginx) · prometheus
#
# Usage:
#   docker compose up --build          # full stack
#   docker compose up api redis        # API + cache only
#   docker compose logs -f api         # stream logs
# ══════════════════════════════════════════════════════════════════

services:

  # ── API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: sentiment-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/models/checkpoints/final
      - ONNX_PATH=/app/models/checkpoints/model_sim.onnx
      - USE_ONNX=true
      - REDIS_URL=redis://redis:6379
      - API_KEYS=dev-key-123,prod-key-change-me
      - MAX_LENGTH=128
      - CACHE_TTL=3600
      - LOG_LEVEL=INFO
    volumes:
      - ./models/checkpoints:/app/models/checkpoints:ro
      - api-logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sentiment-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── REDIS ──────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: sentiment-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly no
    volumes:
      - redis-data:/data
    networks:
      - sentiment-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ── UI (Nginx static) ──────────────────────────────────────────
  ui:
    image: nginx:1.27-alpine
    container_name: sentiment-ui
    ports:
      - "3000:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - sentiment-net
    depends_on:
      - api
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  # ── PROMETHEUS ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: sentiment-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - sentiment-net
    restart: unless-stopped

networks:
  sentiment-net:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  api-logs:
